<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>上帝模拟器</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="map-pane">
        <header class="topbar">
          <div>
            <h1>上帝模拟器</h1>
            <p id="worldMeta">第 0 刻</p>
          </div>
          <div class="tick-controls">
            <button id="tickOne" type="button">推进 1 刻</button>
            <button id="tickFive" type="button">推进 5 刻</button>
          </div>
        </header>

        <div id="pauseBanner" class="pause-banner" hidden></div>
        <section id="strategyWait" class="strategy-wait" aria-live="polite" hidden>
          <div class="strategy-wait-header">
            <div>
              <div class="strategy-wait-kicker">战略时刻</div>
              <h2 id="strategyWaitTitle">首领正在思考</h2>
            </div>
            <div id="strategyWaitElapsed" class="strategy-wait-elapsed">0s</div>
          </div>
          <div class="strategy-progress" aria-hidden="true">
            <div id="strategyProgressBar"></div>
          </div>
          <p id="strategyWaitStage" class="strategy-wait-stage">三位首领正在评估局势。</p>
          <div id="leaderWaitList" class="leader-wait-list"></div>
          <div class="strategy-wait-hint">等待期间仍可查看地图、事件与各族档案；完成后会自动刷新。</div>
        </section>
        <canvas id="worldCanvas" width="960" height="640"></canvas>
        <div id="tileTip" class="tile-tip" hidden></div>

        <section class="god-tools" aria-label="上帝工具">
          <div class="tool-group">
            <label>
              赐给
              <select id="factionSelect"></select>
            </label>
            <label>
              资源
              <select id="resourceSelect"></select>
            </label>
            <label>
              数量
              <input id="resourceAmount" type="number" min="1" value="50" />
            </label>
            <button id="giveButton" type="button">赐予</button>
          </div>

          <div class="tool-group">
            <label>
              X 横向
              <input id="coordX" type="number" min="0" value="0" />
            </label>
            <label>
              Y 纵向
              <input id="coordY" type="number" min="0" value="0" />
            </label>
            <label>
              天气
              <select id="weatherSelect"></select>
            </label>
            <label>
              持续
              <input id="weatherDuration" type="number" min="0" max="50" value="5" />
            </label>
            <button id="weatherButton" type="button">改变天气</button>
          </div>
        </section>
      </section>

      <aside class="side-pane">
        <section class="panel">
          <h2>种族</h2>
          <div id="factions"></div>
        </section>

        <section class="panel">
          <h2>祈求</h2>
          <div id="petitions"></div>
        </section>

        <section class="panel god-chat-panel">
          <h2>神谕私聊</h2>
          <label>
            首领
            <select id="godChatFactionSelect"></select>
          </label>
          <div id="godChatMessages" class="god-chat-messages"></div>
          <div class="god-chat-compose">
            <textarea id="godChatInput" rows="3" placeholder="例如：若你攻打兽人，我会赐予粮食和木材。"></textarea>
            <button id="godChatButton" type="button">发送神谕</button>
          </div>
        </section>

        <section class="panel events-panel">
          <h2>事件</h2>
          <div id="events"></div>
        </section>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
